[theme]
# ボタンや選択状態の色：知性と落ち着きを感じさせるディープ・スレート（深い紺灰色）
primaryColor = "#34495e"

# 全体の背景色：無駄のない清潔な白
backgroundColor = "#ffffff"

# サイドバーやフォームの背景色：視覚的ノイズを抑えた極めて薄いグレー
secondaryBackgroundColor = "#f1f3f6"

# 文字色：真っ黒よりもわずかに柔らかく、長時間の閲覧でも目が疲れないダークグレー
textColor = "#2c3e50"

# フォント：無駄な装飾のないサンセリフ体
font = "sans serif"
